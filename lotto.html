<title>로또 추첨기</title>
<style>
:root {
  --bg: #f2ede2;
  --bg-2: #e8e0cf;
  --ink: #23261f;
  --ink-soft: #5b5c50;
  --felt: #0f3d2e;
  --felt-light: #145940;
  --gold: #c9a13b;
  --gold-bright: #f4d778;
  --gold-soft: #e8d9a8;
  --line: rgba(35,38,31,0.14);

  --ball-1: #f4c62e;
  --ball-1-ink: #4a3600;
  --ball-2: #3f7fd1;
  --ball-2-ink: #eef4ff;
  --ball-3: #d8492f;
  --ball-3-ink: #fff0ea;
  --ball-4: #7a7d74;
  --ball-4-ink: #f4f4ef;
  --ball-5: #4f9b52;
  --ball-5-ink: #eefbef;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #14170f;
    --bg-2: #1b1f16;
    --ink: #eae6d6;
    --ink-soft: #a9a894;
    --felt: #0b2b21;
    --felt-light: #123f2f;
    --gold: #d8b551;
    --gold-bright: #f6dd82;
    --gold-soft: #4a3f1e;
    --line: rgba(234,230,214,0.14);
  }
}
:root[data-theme="dark"] {
  --bg: #14170f;
  --bg-2: #1b1f16;
  --ink: #eae6d6;
  --ink-soft: #a9a894;
  --felt: #0b2b21;
  --felt-light: #123f2f;
  --gold: #d8b551;
  --gold-bright: #f6dd82;
  --gold-soft: #4a3f1e;
  --line: rgba(234,230,214,0.14);
}
:root[data-theme="light"] {
  --bg: #f2ede2;
  --bg-2: #e8e0cf;
  --ink: #23261f;
  --ink-soft: #5b5c50;
  --felt: #0f3d2e;
  --felt-light: #145940;
  --gold: #c9a13b;
  --gold-bright: #f4d778;
  --gold-soft: #e8d9a8;
  --line: rgba(35,38,31,0.14);
}

* { box-sizing: border-box; }
@media (prefers-reduced-motion: reduce) {
  * { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
}

body {
  margin: 0;
  min-height: 100%;
  background:
    radial-gradient(ellipse at 50% -10%, var(--bg-2), transparent 60%),
    var(--bg);
  color: var(--ink);
  font-family: Georgia, 'Times New Roman', serif;
  display: flex;
  justify-content: center;
  padding: 40px 20px 60px;
}

.stage {
  width: 100%;
  max-width: 640px;
}

.masthead {
  text-align: center;
  margin-bottom: 28px;
}
.masthead .eyebrow {
  font-family: -apple-system, 'Segoe UI', sans-serif;
  font-size: 11px;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: var(--gold);
  font-weight: 700;
}
.masthead h1 {
  font-size: clamp(32px, 6vw, 44px);
  margin: 6px 0 4px;
  letter-spacing: 0.01em;
  text-wrap: balance;
  font-weight: 400;
}
.masthead p {
  font-family: -apple-system, 'Segoe UI', sans-serif;
  color: var(--ink-soft);
  font-size: 14px;
  margin: 0;
}

.table {
  background: linear-gradient(180deg, var(--felt-light), var(--felt));
  border-radius: 22px;
  padding: 36px 28px 30px;
  box-shadow:
    0 1px 0 rgba(255,255,255,0.08) inset,
    0 30px 60px -30px rgba(0,0,0,0.5),
    0 0 0 1px rgba(0,0,0,0.15);
  position: relative;
  overflow: hidden;
  transition: box-shadow 0.15s ease;
}
.table::before {
  content: "";
  position: absolute;
  inset: 10px;
  border-radius: 16px;
  border: 1px dashed rgba(232,217,168,0.22);
  pointer-events: none;
}
.table.shaking {
  animation: tableShake 0.32s ease-in-out infinite;
}
@keyframes tableShake {
  0%, 100% { transform: translate(0, 0); }
  25% { transform: translate(-1.5px, 1px); }
  50% { transform: translate(1.5px, -1px); }
  75% { transform: translate(-1px, -1.5px); }
}

.flash {
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at 50% 40%, rgba(246,221,130,0.55), transparent 65%);
  opacity: 0;
  pointer-events: none;
}
.flash.pulse {
  animation: flashPulse 0.5s ease-out;
}
@keyframes flashPulse {
  0% { opacity: 0.9; }
  100% { opacity: 0; }
}

.main-row {
  display: flex;
  justify-content: center;
  gap: 14px;
  min-height: 92px;
  align-items: center;
  flex-wrap: wrap;
  position: relative;
  z-index: 1;
}

.bonus-row {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 14px;
  margin-top: 22px;
  padding-top: 20px;
  border-top: 1px dashed rgba(232,217,168,0.22);
  min-height: 78px;
  position: relative;
  z-index: 1;
}
.bonus-label {
  font-family: -apple-system, 'Segoe UI', sans-serif;
  font-size: 11px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--gold-soft);
  opacity: 0.75;
}
.plus {
  color: var(--gold-soft);
  font-size: 22px;
  font-family: -apple-system, sans-serif;
  opacity: 0.6;
}

.ball {
  width: 68px;
  height: 68px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: -apple-system, 'Segoe UI', sans-serif;
  font-weight: 700;
  font-size: 24px;
  font-variant-numeric: tabular-nums;
  position: relative;
  opacity: 0;
  transform: translateY(-18px) scale(0.6);
  box-shadow:
    inset 0 -8px 14px rgba(0,0,0,0.22),
    inset 0 6px 8px rgba(255,255,255,0.35),
    0 6px 14px rgba(0,0,0,0.35);
}
.ball.enter {
  animation: drop 0.4s cubic-bezier(.34,1.56,.64,1) forwards;
}
.ball.rolling {
  animation: rollShake 0.09s linear infinite;
}
.ball.lock {
  animation: lockBounce 0.42s cubic-bezier(.34,1.56,.64,1);
}
.ball.lock::after {
  content: "";
  position: absolute;
  inset: -6px;
  border-radius: 50%;
  border: 2px solid var(--gold-bright);
  opacity: 0;
  animation: ring 0.5s ease-out;
}
.ball.bonus-ball::before {
  content: "";
  position: absolute;
  inset: -5px;
  border-radius: 50%;
  border: 2px solid var(--gold-bright);
  box-shadow: 0 0 10px rgba(246,221,130,0.5);
}
@keyframes drop {
  0% { opacity: 0; transform: translateY(-26px) scale(0.5) rotate(-30deg); }
  60% { opacity: 1; }
  100% { opacity: 1; transform: translateY(0) scale(1) rotate(0deg); }
}
@keyframes rollShake {
  0% { transform: translateY(0) rotate(-4deg); }
  50% { transform: translateY(-3px) rotate(4deg); }
  100% { transform: translateY(0) rotate(-4deg); }
}
@keyframes lockBounce {
  0% { transform: scale(1.28); }
  45% { transform: scale(0.92); }
  70% { transform: scale(1.08); }
  100% { transform: scale(1); }
}
@keyframes ring {
  0% { opacity: 0.9; transform: scale(1); }
  100% { opacity: 0; transform: scale(1.6); }
}

.b1 { background: radial-gradient(circle at 32% 28%, #ffe27a, var(--ball-1)); color: var(--ball-1-ink); }
.b2 { background: radial-gradient(circle at 32% 28%, #7fb0ec, var(--ball-2)); color: var(--ball-2-ink); }
.b3 { background: radial-gradient(circle at 32% 28%, #ef8267, var(--ball-3)); color: var(--ball-3-ink); }
.b4 { background: radial-gradient(circle at 32% 28%, #a6a89c, var(--ball-4)); color: var(--ball-4-ink); }
.b5 { background: radial-gradient(circle at 32% 28%, #7dc27f, var(--ball-5)); color: var(--ball-5-ink); }

.controls {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
  margin-top: 30px;
}

button.draw {
  font-family: -apple-system, 'Segoe UI', sans-serif;
  font-weight: 600;
  font-size: 15px;
  letter-spacing: 0.02em;
  color: var(--felt);
  background: linear-gradient(180deg, #f0dd9c, var(--gold));
  border: none;
  border-radius: 999px;
  padding: 14px 34px;
  cursor: pointer;
  box-shadow: 0 10px 20px -8px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.5);
  transition: transform 0.15s ease, box-shadow 0.15s ease;
}
button.draw:hover { transform: translateY(-1px); box-shadow: 0 14px 24px -8px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.5); }
button.draw:active { transform: translateY(1px) scale(0.98); }
button.draw:focus-visible { outline: 2px solid var(--gold); outline-offset: 3px; }
button.draw:disabled { opacity: 0.55; cursor: default; transform: none; }

.count-row {
  display: flex;
  align-items: center;
  gap: 10px;
  font-family: -apple-system, 'Segoe UI', sans-serif;
  font-size: 13px;
  color: var(--ink-soft);
}
.count-row select {
  font-family: inherit;
  font-size: 13px;
  padding: 5px 9px;
  border-radius: 8px;
  border: 1px solid var(--line);
  background: var(--bg);
  color: var(--ink);
}

.history {
  margin-top: 34px;
}
.history h2 {
  font-family: -apple-system, 'Segoe UI', sans-serif;
  font-size: 11px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--ink-soft);
  font-weight: 600;
  margin: 0 0 12px;
  border-bottom: 1px solid var(--line);
  padding-bottom: 8px;
}
.history ol {
  list-style: none;
  margin: 0;
  padding: 0;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.history li {
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: -apple-system, 'Segoe UI', sans-serif;
  font-size: 13px;
  color: var(--ink-soft);
  flex-wrap: wrap;
}
.history .idx {
  font-variant-numeric: tabular-nums;
  width: 20px;
  color: var(--ink-soft);
  opacity: 0.6;
}
.history .mini {
  width: 26px;
  height: 26px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
}
.history .mini.bonus {
  box-shadow: 0 0 0 2px var(--gold-bright);
}
.history .sep {
  color: var(--gold-soft);
  opacity: 0.7;
  font-size: 13px;
}

.hint {
  text-align: center;
  font-family: -apple-system, 'Segoe UI', sans-serif;
  font-size: 13px;
  color: var(--ink-soft);
  margin-top: 18px;
  min-height: 18px;
  transition: color 0.15s ease;
}
.hint.live {
  color: var(--gold);
  font-weight: 600;
  letter-spacing: 0.04em;
}
</style>

<div class="stage">
  <div class="masthead">
    <div class="eyebrow">Since 1 · 45</div>
    <h1>로또 추첨기</h1>
    <p>1부터 45까지, 서로 다른 숫자 여섯 개와 보너스 번호</p>
  </div>

  <div class="table" id="tableEl">
    <div class="flash" id="flashEl"></div>
    <div class="main-row" id="slotRow"></div>
    <div class="bonus-row" id="bonusRow">
      <span class="bonus-label" id="bonusLabel">보너스</span>
    </div>
  </div>

  <div class="controls">
    <button class="draw" id="drawBtn">번호 추첨</button>
    <div class="count-row">
      <label for="setCount">회차 수</label>
      <select id="setCount">
        <option value="1">1세트</option>
        <option value="3">3세트</option>
        <option value="5">5세트</option>
      </select>
    </div>
  </div>

  <div class="hint" id="hint">버튼을 눌러 번호를 추첨하세요</div>

  <div class="history" id="historyBlock" style="display:none;">
    <h2>지난 추첨</h2>
    <ol id="historyList"></ol>
  </div>
</div>

<script>
(function() {
  const slotRow = document.getElementById('slotRow');
  const bonusRow = document.getElementById('bonusRow');
  const bonusLabel = document.getElementById('bonusLabel');
  const tableEl = document.getElementById('tableEl');
  const flashEl = document.getElementById('flashEl');
  const drawBtn = document.getElementById('drawBtn');
  const hint = document.getElementById('hint');
  const historyBlock = document.getElementById('historyBlock');
  const historyList = document.getElementById('historyList');
  const setCountEl = document.getElementById('setCount');

  function colorClass(n) {
    if (n <= 10) return 'b1';
    if (n <= 20) return 'b2';
    if (n <= 30) return 'b3';
    if (n <= 40) return 'b4';
    return 'b5';
  }

  function drawSet() {
    const pool = Array.from({length: 45}, (_, i) => i + 1);
    const main = [];
    for (let i = 0; i < 6; i++) {
      const idx = Math.floor(Math.random() * pool.length);
      main.push(pool.splice(idx, 1)[0]);
    }
    main.sort((a, b) => a - b);
    const bonus = pool[Math.floor(Math.random() * pool.length)];
    return { main, bonus };
  }

  function sleep(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
  }

  function makeBallEl(colorCls, extraCls) {
    const el = document.createElement('div');
    el.className = 'ball ' + colorCls + (extraCls ? ' ' + extraCls : '');
    el.textContent = Math.ceil(Math.random() * 45);
    return el;
  }

  async function rollBall(el, finalNum, rollDuration) {
    el.classList.add('enter');
    await sleep(160);
    el.classList.add('rolling');
    const startTime = Date.now();
    await new Promise(resolve => {
      const timer = setInterval(() => {
        el.textContent = 1 + Math.floor(Math.random() * 45);
        if (Date.now() - startTime >= rollDuration) {
          clearInterval(timer);
          resolve();
        }
      }, 55);
    });
    el.classList.remove('rolling');
    el.textContent = finalNum;
    el.className = el.className.replace('rolling', '').trim();
    el.classList.add(colorClass(finalNum), 'lock');
  }

  function flashBurst() {
    flashEl.classList.remove('pulse');
    void flashEl.offsetWidth;
    flashEl.classList.add('pulse');
  }

  async function playDraw(result) {
    tableEl.classList.add('shaking');
    hint.textContent = '추첨 중…';
    hint.classList.add('live');

    slotRow.innerHTML = '';
    const mainEls = result.main.map(() => {
      const el = document.createElement('div');
      el.className = 'ball b1';
      el.textContent = '?';
      slotRow.appendChild(el);
      return el;
    });

    bonusLabel.style.display = 'none';
    const bonusEl = document.createElement('div');
    bonusEl.className = 'ball b1 bonus-ball';
    bonusEl.textContent = '?';
    bonusRow.appendChild(bonusEl);

    for (let i = 0; i < mainEls.length; i++) {
      const dur = 550 + i * 90;
      await rollBall(mainEls[i], result.main[i], dur);
      flashBurst();
      await sleep(90);
    }

    tableEl.classList.remove('shaking');
    hint.textContent = '보너스 번호 추첨 중…';
    await sleep(150);
    await rollBall(bonusEl, result.bonus, 700);
    bonusEl.classList.add('bonus-ball');
    flashBurst();

    hint.classList.remove('live');
  }

  function addHistory(result, setLabel) {
    historyBlock.style.display = 'block';
    const li = document.createElement('li');
    const idx = document.createElement('span');
    idx.className = 'idx';
    idx.textContent = setLabel;
    li.appendChild(idx);
    result.main.forEach(n => {
      const mini = document.createElement('span');
      mini.className = 'mini ' + colorClass(n);
      mini.textContent = n;
      li.appendChild(mini);
    });
    const sep = document.createElement('span');
    sep.className = 'sep';
    sep.textContent = '+';
    li.appendChild(sep);
    const bonusMini = document.createElement('span');
    bonusMini.className = 'mini bonus ' + colorClass(result.bonus);
    bonusMini.textContent = result.bonus;
    li.appendChild(bonusMini);
    historyList.insertBefore(li, historyList.firstChild);
    while (historyList.children.length > 8) {
      historyList.removeChild(historyList.lastChild);
    }
  }

  let busy = false;

  drawBtn.addEventListener('click', async () => {
    if (busy) return;
    busy = true;
    drawBtn.disabled = true;

    const setsWanted = parseInt(setCountEl.value, 10);
    const allSets = Array.from({length: setsWanted}, () => drawSet());

    await playDraw(allSets[0]);

    allSets.forEach((s, i) => addHistory(s, (i + 1) + '회'));
    hint.textContent = setsWanted > 1
      ? setsWanted + '세트가 모두 히스토리에 기록되었습니다'
      : '행운을 빕니다';

    drawBtn.disabled = false;
    busy = false;
  });
})();
</script>
