.ball.enter {

.ball.lock::after {

@keyframes drop {

<div class="stage">

      <label for="setCount">회차 수</label>
      <select id="setCount">
        <option value="1">1세트</option>

    <h2>지난 추첨</h2>
    <ol id="historyList"></ol>
  </div>

  <div class="saju-section">
    <div class="saju-head">
      <h2>사주로 번호 추천받기</h2>
      <p>생년월일, 태어난 시간, 성별을 입력하면 AI가 사주를 풀이해 번호 7개(보너스 포함)를 추천합니다</p>
    </div>

    <form class="saju-form" id="sajuForm">
      <div class="field-row">
        <div class="field">
          <label for="birthDate">생년월일</label>
          <input type="date" id="birthDate" required />
        </div>
        <div class="field">
          <label for="birthTime">태어난 시간</label>
          <input type="time" id="birthTime" />
        </div>
        <div class="field">
          <label for="gender">성별</label>
          <select id="gender">
            <option value="">선택 안 함</option>
            <option value="여성">여성</option>
            <option value="남성">남성</option>
          </select>
        </div>
      </div>
      <label class="unknown-time">
        <input type="checkbox" id="unknownTime" /> 태어난 시간을 몰라요
      </label>
      <button type="submit" class="draw" id="sajuBtn">사주 분석하고 번호 추천받기</button>
    </form>

    <div class="saju-hint" id="sajuHint"></div>

    <div class="saju-result" id="sajuResult" style="display:none;">
      <p class="saju-analysis" id="sajuAnalysis"></p>
      <div class="main-row ai-row" id="sajuBallRow"></div>
      <div class="bonus-row" id="sajuBonusRow">
        <span class="bonus-label" id="sajuBonusLabel">보너스</span>
      </div>
    </div>
  </div>
</div>

<script>
(function() {
  const slotRow = document.getElementById('slotRow');
  const bonusRow = document.getElementById('bonusRow');
  const bonusLabel = document.getElementById('bonusLabel');
  const tableEl = document.getElementById('tableEl');
  const flashEl = document.getElementById('flashEl');
  const drawBtn = document.getElementById('drawBtn');
  const hint = document.getElementById('hint');
  const historyBlock = document.getElementById('historyBlock');
  const historyList = document.getElementById('historyList');
  const setCountEl = document.getElementById('setCount');

  function colorClass(n) {
    if (n <= 10) return 'b1';
    if (n <= 20) return 'b2';
    if (n <= 30) return 'b3';
    if (n <= 40) return 'b4';
    return 'b5';
  }

  function drawSet() {
    const pool = Array.from({length: 45}, (_, i) => i + 1);
    const main = [];
    for (let i = 0; i < 6; i++) {
      const idx = Math.floor(Math.random() * pool.length);
      main.push(pool.splice(idx, 1)[0]);
    }
    main.sort((a, b) => a - b);
    const bonus = pool[Math.floor(Math.random() * pool.length)];
    return { main, bonus };
  }

  function sleep(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
  }

  function makeBallEl(colorCls, extraCls) {
    const el = document.createElement('div');
    el.className = 'ball ' + colorCls + (extraCls ? ' ' + extraCls : '');
    el.textContent = Math.ceil(Math.random() * 45);
    return el;
  }

  async function rollBall(el, finalNum, rollDuration, finalClass) {
    el.classList.add('enter');
    await sleep(160);
    el.classList.add('rolling');
    const startTime = Date.now();
    await new Promise(resolve => {
      const timer = setInterval(() => {
        el.textContent = 1 + Math.floor(Math.random() * 45);
        if (Date.now() - startTime >= rollDuration) {
          clearInterval(timer);
          resolve();
        }
      }, 55);
    });
    el.classList.remove('rolling');
    el.textContent = finalNum;
    el.className = el.className.replace('rolling', '').trim();
    el.classList.add(finalClass || colorClass(finalNum), 'lock');
  }

  function flashBurst() {
    flashEl.classList.remove('pulse');
    void flashEl.offsetWidth;
    flashEl.classList.add('pulse');
  }

  async function playDraw(result) {
    tableEl.classList.add('shaking');
    hint.textContent = '추첨 중…';
    hint.classList.add('live');

    slotRow.innerHTML = '';
    const mainEls = result.main.map(() => {
      const el = document.createElement('div');
      el.className = 'ball b1';
      el.textContent = '?';
      slotRow.appendChild(el);
      return el;
    });

    bonusLabel.style.display = 'none';
    const bonusEl = document.createElement('div');
    bonusEl.className = 'ball b1 bonus-ball';
    bonusEl.textContent = '?';
    bonusRow.appendChild(bonusEl);

    for (let i = 0; i < mainEls.length; i++) {
      const dur = 550 + i * 90;
      await rollBall(mainEls[i], result.main[i], dur, colorClass(result.main[i]));
      flashBurst();
      await sleep(90);
    }

    tableEl.classList.remove('shaking');
    hint.textContent = '보너스 번호 추첨 중…';
    await sleep(150);
    await rollBall(bonusEl, result.bonus, 700, colorClass(result.bonus));
    bonusEl.classList.add('bonus-ball');
    flashBurst();

    hint.classList.remove('live');
  }

  function addHistory(result, setLabel) {
    historyBlock.style.display = 'block';
    const li = document.createElement('li');
    const idx = document.createElement('span');
    idx.className = 'idx';
    idx.textContent = setLabel;
    li.appendChild(idx);
    result.main.forEach(n => {
      const mini = document.createElement('span');
      mini.className = 'mini ' + colorClass(n);
      mini.textContent = n;
      li.appendChild(mini);
    });
    const sep = document.createElement('span');
    sep.className = 'sep';
    sep.textContent = '+';
    li.appendChild(sep);
    const bonusMini = document.createElement('span');
    bonusMini.className = 'mini bonus ' + colorClass(result.bonus);
    bonusMini.textContent = result.bonus;
    li.appendChild(bonusMini);
    historyList.insertBefore(li, historyList.firstChild);
    while (historyList.children.length > 8) {
      historyList.removeChild(historyList.lastChild);
    }
  }

  let busy = false;

  drawBtn.addEventListener('click', async () => {
    if (busy) return;
    busy = true;
    drawBtn.disabled = true;

    const setsWanted = parseInt(setCountEl.value, 10);
    const allSets = Array.from({length: setsWanted}, () => drawSet());

    await playDraw(allSets[0]);

    allSets.forEach((s, i) => addHistory(s, (i + 1) + '회'));
    hint.textContent = setsWanted > 1
      ? setsWanted + '세트가 모두 히스토리에 기록되었습니다'
      : '행운을 빕니다';

    drawBtn.disabled = false;
    busy = false;
  });

  const sajuForm = document.getElementById('sajuForm');
  const birthDateEl = document.getElementById('birthDate');
  const birthTimeEl = document.getElementById('birthTime');
  const genderEl = document.getElementById('gender');
  const unknownTimeEl = document.getElementById('unknownTime');
  const sajuBtn = document.getElementById('sajuBtn');
  const sajuHint = document.getElementById('sajuHint');
  const sajuResult = document.getElementById('sajuResult');
  const sajuAnalysisEl = document.getElementById('sajuAnalysis');
  const sajuBallRow = document.getElementById('sajuBallRow');
  const sajuBonusRow = document.getElementById('sajuBonusRow');
  const sajuBonusLabel = document.getElementById('sajuBonusLabel');

  unknownTimeEl.addEventListener('change', () => {
    birthTimeEl.disabled = unknownTimeEl.checked;
    if (unknownTimeEl.checked) birthTimeEl.value = '';
  });

  let sajuBusy = false;

  sajuForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    if (sajuBusy) return;
    if (!birthDateEl.value) {
      sajuHint.classList.remove('live');
      sajuHint.classList.add('error');
      sajuHint.textContent = '생년월일을 입력해주세요.';
      return;
    }

    sajuBusy = true;
    sajuBtn.disabled = true;
    sajuHint.classList.remove('error');
    sajuHint.classList.add('live');
    sajuHint.textContent = '사주를 풀이하는 중…';
    sajuResult.style.display = 'none';

    try {
      const res = await fetch('/api/saju', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          birthDate: birthDateEl.value,
          birthTime: unknownTimeEl.checked ? null : (birthTimeEl.value || null),
          gender: genderEl.value || null,
        }),
      });
      const data = await res.json();
      if (!res.ok) {
        throw new Error(data.error || '분석에 실패했습니다.');
      }

      sajuResult.style.display = 'block';
      sajuAnalysisEl.textContent = data.analysis;
      sajuBallRow.innerHTML = '';
      sajuBonusLabel.style.display = '';
      const oldBonusBall = sajuBonusRow.querySelector('.ball');
      if (oldBonusBall) oldBonusBall.remove();

      const els = data.numbers.map(() => {
        const el = document.createElement('div');
        el.className = 'ball';
        el.textContent = '?';
        sajuBallRow.appendChild(el);
        return el;
      });

      sajuHint.textContent = '번호를 불러오는 중…';
      for (let i = 0; i < els.length; i++) {
        await rollBall(els[i], data.numbers[i], 480 + i * 70, 'ai');
        await sleep(70);
      }

      sajuHint.textContent = '보너스 번호를 불러오는 중…';
      sajuBonusLabel.style.display = 'none';
      const bonusEl = document.createElement('div');
      bonusEl.className = 'ball ai bonus-ball';
      bonusEl.textContent = '?';
      sajuBonusRow.appendChild(bonusEl);
      await rollBall(bonusEl, data.bonus, 550, 'ai');
      bonusEl.classList.add('bonus-ball');

      sajuHint.classList.remove('live');
      sajuHint.textContent = '사주 분석을 바탕으로 추천된 번호입니다';
    } catch (err) {
      sajuHint.classList.remove('live');
      sajuHint.classList.add('error');
      sajuHint.textContent = err.message || '오류가 발생했습니다. 잠시 후 다시 시도해주세요.';
    } finally {
      sajuBtn.disabled = false;
      sajuBusy = false;
    }
  });
})();
</script>
